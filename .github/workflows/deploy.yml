name: Deploy to EC2

# develop 브랜치에 push되면 이미지를 빌드해 GHCR에 올리고 EC2에서 재기동한다.
on:
  push:
    branches: [develop]
  workflow_dispatch: # 수동 실행도 허용

env:
  # GHCR 경로는 모두 소문자여야 한다 (org: UMC-10th-Bodeum → umc-10th-bodeum)
  IMAGE: ghcr.io/umc-10th-bodeum/bodeum-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # GHCR push 권한
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false # 이 워크플로우는 리포에 push하지 않으므로 토큰 미보존

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: meta
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # 자동 배포(SSH)는 develop에 반영됐을 때만. 브랜치에서 수동 실행 시엔 이미지 빌드까지만 수행한다.
    if: github.ref == 'refs/heads/develop'
    permissions:
      packages: read # EC2에서 GHCR pull 시 쓸 GITHUB_TOKEN 권한
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }} # 비어 있으면 기본 22
          # GITHUB_TOKEN은 이 job 실행 동안만 유효하며 GHCR pull 권한이 있다.
          envs: GHCR_USER,GHCR_TOKEN,IMAGE
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd ~/bodeum
            docker compose pull
            docker compose up -d
            docker image prune -f
            docker logout ghcr.io
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ env.IMAGE }}
