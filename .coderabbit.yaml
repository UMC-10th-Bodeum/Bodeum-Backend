language: ko-KR

tone_instructions: >
  피드백은 명확하고 구체적으로 작성하고, 문제의 원인과 개선 방법을 함께 제시하세요.
  비판보다는 개선 중심으로 제안하세요.

reviews:
  profile: chill

  commit_status: true
  request_changes_workflow: false

  high_level_summary: true
  changed_files_summary: true
  collapse_walkthrough: true
  sequence_diagrams: true

  assess_linked_issues: true
  related_issues: false
  related_prs: true

  suggested_labels: false
  auto_apply_labels: false

  suggested_reviewers: false
  auto_assign_reviewers: false

  poem: true

  auto_review:
    enabled: true
    auto_incremental_review: true
    base_branches:
      - develop

  path_instructions:
    - path: "**/controller/**"
      instructions: >
        Controller는 요청 검증, 인증 사용자 추출, Service 호출, 응답 반환만 담당해야 합니다.
        Controller에서 Repository를 직접 호출하지 않는지 확인하세요.
        Controller에 복잡한 비즈니스 로직이 포함되어 있지 않은지 확인하세요.
        요청 DTO에 필요한 입력값 검증이 적용되어 있는지 확인하세요.

    - path: "**/service/**"
      instructions: >
        비즈니스 로직과 권한 검증이 Service에서 수행되는지 확인하세요.
        조회 메서드에는 가능한 경우 @Transactional(readOnly = true)를 적용했는지 확인하세요.
        생성, 수정, 삭제 메서드에는 필요한 경우 @Transactional을 적용했는지 확인하세요.
        Service에서 ResponseEntity를 직접 반환하지 않는지 확인하세요.

    - path: "**/repository/**"
      instructions: >
        Repository는 DB 조회와 저장에 집중하는지 확인하세요.
        복잡한 조회가 필요한 경우 메서드명 쿼리, @Query, QueryDSL 사용이 적절한지 확인하세요.

    - path: "**/entity/**"
      instructions: >
        Entity가 API 응답으로 직접 반환되지 않는지 확인하세요.
        Entity에 불필요한 @Setter가 사용되지 않는지 확인하세요.
        연관관계에서 지연 로딩이 필요한 경우 fetch = FetchType.LAZY가 적용되어 있는지 확인하세요.
        테이블과 컬럼은 snake_case, Java Entity 필드는 camelCase를 일관되게 사용하는지 확인하세요.
        PK는 `id` 또는 `{table}_id` 중 프로젝트에서 채택한 규칙을 일관되게 사용하는지 확인하세요.
        FK는 `{referenced_table}_id` 형식을 일관되게 사용하는지 확인하세요.

    - path: "**/dto/**"
      instructions: >
        Request DTO와 Response DTO가 역할에 맞게 분리되어 있는지 확인하세요.
        요청 DTO에는 필요한 입력값 검증이 작성되어 있는지 확인하세요.
        DTO는 가능하면 record로 작성되어 있는지 확인하세요.
        DTO 네이밍이 프로젝트 규칙과 일관되는지 확인하세요.

    - path: "**/exception/**"
      instructions: >
        예외 처리가 ErrorCode와 BusinessException 중심으로 일관되게 구성되어 있는지 확인하세요.
        사용자에게 노출되는 메시지가 여러 계층에 흩어져 하드코딩되어 있지 않은지 확인하세요.

    - path: "src/main/resources/db/migration/**"
      instructions: >
        공용 DB 변경이 Flyway migration으로 관리되는지 확인하세요.
        이미 적용된 migration 파일을 수정하지 않고 새 migration을 추가했는지 확인하세요.
        ERD, Entity, migration 간 구조가 불일치하지 않는지 확인하세요.

    - path: "**/*.java"
      instructions: >
        코드가 전반적으로 읽기 쉽고 일관된 스타일을 유지하는지 확인하세요.
        조건문과 반복문에 중괄호를 사용하여 의도를 명확히 했는지 확인하세요.
        비즈니스 의미가 있는 반복 숫자나 문자열은 상수 또는 Enum으로 분리했는지 확인하세요.
        메서드와 클래스 네이밍이 역할을 명확히 드러내는지 확인하세요.

chat:
  auto_reply: true

knowledge_base:
  web_search:
    enabled: true
  code_guidelines:
    enabled: true