spring.application.name=Bodeum

# JWT: 시크릿은 32바이트 이상. 비워두면 기동 시 임시 키 생성(재시작 시 access token 전부 무효화).
bodeum.auth.jwt-secret=${JWT_SECRET:}
bodeum.auth.access-token-ttl=${AUTH_ACCESS_TOKEN_TTL:1h}
bodeum.auth.refresh-token-ttl=${AUTH_REFRESH_TOKEN_TTL:14d}

# OAuth client ids are injected through environment variables in local/production environments.
bodeum.oauth.base-url=${BODEUM_BASE_URL:http://localhost:8080}
# true면 client-id가 비어 있는 provider에 한해 개발용 모의 로그인을 허용한다. 운영에서는 반드시 false.
bodeum.oauth.mock-enabled=${OAUTH_MOCK_ENABLED:false}
bodeum.oauth.kakao.client-id=${KAKAO_CLIENT_ID:}
bodeum.oauth.kakao.client-secret=${KAKAO_CLIENT_SECRET:}
bodeum.oauth.kakao.redirect-uri=${KAKAO_REDIRECT_URI:}
bodeum.oauth.kakao.scope=${KAKAO_SCOPE:}
bodeum.oauth.kakao.token-uri=${KAKAO_TOKEN_URI:}
bodeum.oauth.kakao.user-info-uri=${KAKAO_USER_INFO_URI:}
bodeum.oauth.naver.client-id=${NAVER_CLIENT_ID:}
bodeum.oauth.naver.client-secret=${NAVER_CLIENT_SECRET:}
bodeum.oauth.naver.redirect-uri=${NAVER_REDIRECT_URI:}
bodeum.oauth.naver.token-uri=${NAVER_TOKEN_URI:}
bodeum.oauth.naver.user-info-uri=${NAVER_USER_INFO_URI:}
