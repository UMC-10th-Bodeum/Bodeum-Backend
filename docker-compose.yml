services:
  mysql:
    image: mysql:8.0
    container_name: bodeum-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bodeum
    volumes:
      - bodeum-mysql-data:/var/lib/mysql

  chroma:
    image: chromadb/chroma:1.0.0
    container_name: bodeum-chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - bodeum-chroma-data:/data

volumes:
  bodeum-mysql-data:
  bodeum-chroma-data:
